name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-tag:
    name: Validate tag matches crate versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Check rust-rfc7807 version
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "rust-rfc7807") | .version')
          if [ "$CRATE_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Tag v${{ steps.tag.outputs.version }} does not match rust-rfc7807 version $CRATE_VERSION"
            exit 1
          fi
      - name: Check rust-rfc7807-axum version
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "rust-rfc7807-axum") | .version')
          if [ "$CRATE_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Tag v${{ steps.tag.outputs.version }} does not match rust-rfc7807-axum version $CRATE_VERSION"
            exit 1
          fi

  ci:
    name: CI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo doc --workspace --no-deps

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate-tag, ci]
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish rust-rfc7807
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p rust-rfc7807 --locked
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish rust-rfc7807-axum
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p rust-rfc7807-axum --locked
